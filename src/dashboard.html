<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <title>Wedgewood Pool Front Desk</title>
    <style>
      :root {
        --teal: #2196F3;
        --navy: #1B3A5C;
        --aqua: #E8F4F8;
        --white: #FFFFFF;
        --success: #2E7D32;
        --warning: #D32F2F;
        --yellow: #FFF8E1;
        --text: #1A1A1A;
        --muted: #587083;
        --shadow: 0 18px 44px rgba(27, 58, 92, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
      }

      body {
        min-height: 100dvh;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(232, 244, 248, 0.98), rgba(255, 255, 255, 0.72)),
          repeating-linear-gradient(135deg, rgba(33, 150, 243, 0.055) 0 18px, transparent 18px 42px);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 24px;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
      }

      button,
      input {
        font: inherit;
        touch-action: manipulation;
      }

      button {
        min-height: 44px;
        border: 0;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-rows: 60px minmax(80px, 112px) auto minmax(0, 1fr);
        gap: 18px;
        width: min(100%, 1400px);
        height: 100dvh;
        margin: 0 auto;
        padding: 0 24px 24px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 60px;
        margin: 0 -24px;
        padding: 0 calc(24px + env(safe-area-inset-right)) 0 calc(24px + env(safe-area-inset-left));
        color: var(--white);
        background: linear-gradient(115deg, var(--navy), #176CA7 62%, var(--teal));
        box-shadow: 0 7px 20px rgba(27, 58, 92, 0.18);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand img {
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
        object-fit: contain;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
      }

      .brand-title {
        overflow: hidden;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.05;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-cluster {
        display: grid;
        gap: 2px;
        justify-items: end;
        flex: 0 0 auto;
      }

      .clock {
        font-variant-numeric: tabular-nums;
        font-size: 22px;
        font-weight: 800;
      }

      .connection {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #7CB342;
        box-shadow: 0 0 0 3px rgba(124, 179, 66, 0.18);
      }

      .connection.reconnecting .dot {
        background: #FBC02D;
        box-shadow: 0 0 0 3px rgba(251, 192, 45, 0.22);
      }

      .connection.offline .dot {
        background: var(--warning);
        box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.2);
      }

      .moment-card {
        position: relative;
        display: grid;
        min-height: 0;
        max-height: 112px;
        padding: 18px 26px;
        overflow: hidden;
        color: var(--navy);
        background: rgba(255, 255, 255, 0.96);
        border: 2px solid rgba(33, 150, 243, 0.2);
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(27, 58, 92, 0.12);
        transition: opacity 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .moment-card::before {
        position: absolute;
        inset: 0;
        pointer-events: none;
        content: "";
        background: linear-gradient(120deg, rgba(33, 150, 243, 0.12), transparent 44%);
      }

      .moment-card.dimmed {
        opacity: 0.7;
      }

      .moment-card.check-in {
        border-color: rgba(46, 125, 50, 0.34);
        animation: tealFlash 200ms ease-out;
      }

      .moment-card.failed {
        color: var(--warning);
        background: #FFF4F4;
        border-color: rgba(211, 47, 47, 0.54);
        animation: redPulse 1.8s ease-in-out infinite;
      }

      .moment-content {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        min-height: 100%;
        text-align: left;
      }

      .moment-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        font-weight: 700;
      }

      .moment-card.failed .moment-kicker {
        color: var(--warning);
      }

      .moment-copy {
        min-width: 0;
      }

      .moment-identity {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .moment-title {
        margin: 0;
        color: var(--navy);
        font-size: 30px;
        font-weight: 850;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .member-name {
        display: inline;
        margin: 0;
        color: var(--text);
        font-size: inherit;
        font-weight: 900;
        line-height: inherit;
      }

      .moment-subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 17px;
        font-weight: 500;
      }

      .swimmer-line {
        flex: 0 0 auto;
        margin: 0;
        color: var(--navy);
        font-size: 26px;
        font-weight: 850;
        font-variant-numeric: tabular-nums;
      }

      .avatar {
        display: grid;
        width: 56px;
        height: 56px;
        margin: 0;
        place-items: center;
        color: var(--white);
        background: linear-gradient(145deg, var(--teal), var(--navy));
        border-radius: 50%;
        font-size: 20px;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(27, 58, 92, 0.22);
      }

      .soft-pill {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        margin: 0;
        padding: 8px 18px;
        color: var(--navy);
        background: var(--aqua);
        border-radius: 999px;
        font-size: 20px;
        font-weight: 850;
      }

      .failed-actions {
        display: flex;
        justify-content: center;
        margin: 0;
      }

      .primary-button {
        min-height: 56px;
        padding: 0 24px;
        color: var(--white);
        background: var(--teal);
        border-radius: 16px;
        font-size: 24px;
        font-weight: 900;
        box-shadow: 0 10px 20px rgba(33, 150, 243, 0.24);
      }

      .failed .primary-button {
        background: var(--warning);
        box-shadow: 0 10px 20px rgba(211, 47, 47, 0.2);
      }

      .last-updated {
        position: absolute;
        right: 24px;
        bottom: 10px;
        z-index: 2;
        color: var(--muted);
        font-size: 17px;
        font-weight: 800;
      }

      .dashboard-panels {
        display: grid;
        grid-template-columns: 1.2fr 1.35fr 0.9fr;
        gap: 24px;
        min-height: 0;
      }

      .panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        padding: 32px;
        background: rgba(255, 255, 255, 0.94);
        border: 2px solid rgba(27, 58, 92, 0.1);
        border-radius: 22px;
        box-shadow: 0 10px 28px rgba(27, 58, 92, 0.1);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 44px;
        margin-bottom: 16px;
        color: var(--navy);
        font-size: 18px;
        font-weight: 600;
      }

      .panel-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .panel-icon,
      .search-icon svg {
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
      }

      .panel-subtitle,
      .panel-action-message {
        color: var(--muted);
        font-size: 15px;
        font-weight: 500;
      }

      .panel-action-message.error {
        color: var(--warning);
      }

      .activity-list,
      .active-list,
      .signup-list {
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .activity-row,
      .active-row,
      .signup-row {
        display: grid;
        align-items: center;
        gap: 12px;
        min-height: 62px;
        padding: 12px 14px;
        background: rgba(232, 244, 248, 0.58);
        border: 1px solid rgba(27, 58, 92, 0.1);
        border-radius: 16px;
        transition: background 160ms ease, transform 160ms ease;
      }

      .activity-row:hover,
      .active-row:hover,
      .signup-row:hover,
      .result-row:hover {
        background: rgba(232, 244, 248, 0.82);
      }

      .activity-row:active,
      .active-row:active,
      .signup-row:active,
      .result-row:active {
        transform: scale(0.992);
      }

      .activity-row {
        grid-template-columns: 42px minmax(0, 1fr) auto auto;
      }

      .active-row {
        grid-template-columns: minmax(0, 1fr) auto auto;
      }

      .signup-row {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .activity-row.flash {
        animation: tealRowFlash 200ms ease-out;
      }

      .active-row.removing {
        opacity: 0;
        transform: translateX(18px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .activity-avatar {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        color: var(--white);
        background: linear-gradient(145deg, var(--teal), var(--navy));
        border-radius: 50%;
        font-size: 17px;
        font-weight: 900;
      }

      .row-name {
        overflow: hidden;
        color: var(--navy);
        font-size: 16px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-time,
      .row-note {
        color: var(--muted);
        font-size: 16px;
        font-weight: 400;
        font-variant-numeric: tabular-nums;
      }

      .phone-link {
        color: inherit;
        font-variant-numeric: tabular-nums;
        text-decoration: none;
      }

      .phone-link:hover,
      .phone-link:focus {
        color: var(--teal);
        text-decoration: underline;
      }

      .event-badges {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 5px;
      }

      .event-badge {
        min-height: 32px;
        padding: 6px 9px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 950;
        white-space: nowrap;
      }

      .event-badge.checked-in {
        color: var(--white);
        background: var(--success);
      }

      .event-badge.signed-out {
        color: var(--white);
        background: var(--teal);
      }

      .event-badge.guest {
        color: var(--navy);
        background: var(--yellow);
        border: 1px solid rgba(27, 58, 92, 0.14);
      }

      .event-badge.failed {
        color: var(--white);
        background: var(--warning);
      }

      .sign-out-button,
      .manual-check-in-button,
      .new-members-toggle {
        min-height: 44px;
        padding: 0 14px;
        color: var(--white);
        background: var(--teal);
        border-radius: 14px;
        font-size: 16px;
        font-weight: 950;
      }

      .manual-check-in-button {
        color: var(--white);
        background: var(--success);
      }

      .manual-sign-out-button {
        color: var(--navy);
        background: var(--yellow);
        border: 1px solid rgba(249, 168, 37, 0.36);
        box-shadow: none;
      }

      .sign-out-button:disabled,
      .manual-check-in-button:disabled,
      .manual-sign-out-button:disabled {
        opacity: 0.58;
      }

      .new-members-toggle {
        color: var(--navy);
        background: transparent;
        border: 1px solid rgba(27, 58, 92, 0.16);
        box-shadow: none;
      }

      .reset-pool-button {
        width: 44px;
        min-height: 44px;
        padding: 0;
        color: var(--muted);
        background: rgba(88, 112, 131, 0.12);
        border: 1px solid rgba(88, 112, 131, 0.22);
        border-radius: 12px;
        font-size: 18px;
        font-weight: 900;
      }

      .reset-pool-button:disabled {
        opacity: 0.58;
      }

      .new-members-count {
        color: var(--teal);
        font-size: 24px;
        font-weight: 950;
        font-variant-numeric: tabular-nums;
      }

      .empty-panel {
        padding: 12px;
        color: var(--muted);
        font-size: 16px;
        font-weight: 400;
        line-height: 1.25;
      }

      .search-zone {
        display: grid;
        grid-template-rows: auto auto minmax(0, auto);
        min-height: 0;
      }

      .search-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 8px;
        color: var(--navy);
        font-size: 18px;
        font-weight: 600;
      }

      .search-message {
        color: var(--muted);
        font-size: 18px;
        font-weight: 750;
        text-align: right;
      }

      .search-box {
        position: relative;
        display: grid;
        align-items: center;
        margin-bottom: 10px;
      }

      .search-icon {
        position: absolute;
        left: 22px;
        z-index: 1;
        color: var(--navy);
        display: inline-flex;
      }

      .search-input {
        width: 100%;
        min-height: 70px;
        padding: 0 24px 0 62px;
        color: var(--text);
        background: var(--white);
        border: 3px solid var(--navy);
        border-radius: 20px;
        outline: none;
        font-size: 24px;
        font-weight: 800;
        box-shadow: 0 10px 28px rgba(27, 58, 92, 0.12);
      }

      .search-input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 5px rgba(33, 150, 243, 0.18), 0 10px 28px rgba(27, 58, 92, 0.12);
      }

      .results {
        display: grid;
        gap: 10px;
        min-height: 0;
        max-height: 170px;
        padding: 4px 3px 8px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .result-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 18px;
        width: 100%;
        min-height: 76px;
        padding: 14px 18px;
        color: var(--text);
        cursor: pointer;
        text-align: left;
        background: rgba(255, 255, 255, 0.94);
        border: 2px solid rgba(27, 58, 92, 0.1);
        border-radius: 18px;
        box-shadow: 0 8px 20px rgba(27, 58, 92, 0.08);
      }

      .result-row:focus-visible {
        outline: 4px solid rgba(33, 150, 243, 0.3);
        outline-offset: 2px;
      }

      .result-name {
        overflow: hidden;
        color: var(--navy);
        font-size: 22px;
        font-weight: 750;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .result-meta,
      .result-family {
        margin-top: 4px;
        color: var(--muted);
        font-size: 16px;
        font-weight: 400;
        line-height: 1.24;
      }

      .result-family {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .result-actions {
        display: grid;
        gap: 8px;
        justify-items: end;
        align-self: center;
      }

      .badge {
        align-self: start;
        min-width: 96px;
        padding: 8px 12px;
        color: var(--navy);
        background: var(--aqua);
        border-radius: 999px;
        font-size: 16px;
        font-weight: 950;
        text-align: center;
      }

      .badge.active {
        color: var(--white);
        background: var(--success);
      }

      .empty-state,
      .search-error {
        padding: 20px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.78);
        border: 2px dashed rgba(27, 58, 92, 0.18);
        border-radius: 18px;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.3;
      }

      .search-error {
        color: var(--warning);
        background: #FFF4F4;
        border-color: rgba(211, 47, 47, 0.28);
      }

      .pin-overlay,
      .detail-panel {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(27, 58, 92, 0.72);
        backdrop-filter: blur(8px);
      }

      .pin-card {
        width: min(520px, 94vw);
        padding: 30px;
        color: var(--navy);
        background: var(--white);
        border-radius: 28px;
        box-shadow: var(--shadow);
        text-align: center;
      }

      .pin-card h1 {
        margin: 0 0 10px;
        font-size: 36px;
        line-height: 1.1;
      }

      .pin-card p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 21px;
        font-weight: 750;
      }

      .pin-input {
        width: 100%;
        min-height: 66px;
        margin-bottom: 14px;
        color: var(--text);
        border: 3px solid var(--navy);
        border-radius: 18px;
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 0.28em;
        text-align: center;
      }

      .pin-message {
        min-height: 28px;
        margin-bottom: 8px;
        color: var(--warning);
        font-size: 19px;
        font-weight: 850;
      }

      .detail-panel {
        align-items: end;
        background: rgba(27, 58, 92, 0.42);
        opacity: 1;
        transition: opacity 200ms ease;
      }

      .detail-card {
        width: min(760px, 96vw);
        padding: 30px;
        color: var(--text);
        background: var(--white);
        border-radius: 30px 30px 0 0;
        box-shadow: var(--shadow);
        animation: detailIn 200ms ease;
      }

      .detail-card h2 {
        margin: 0 0 16px;
        color: var(--navy);
        font-size: 36px;
        line-height: 1.12;
      }

      .detail-card p {
        margin: 8px 0;
        color: var(--muted);
        font-size: 18px;
        font-weight: 400;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 18px 0;
      }

      .detail-field {
        min-height: 92px;
        padding: 14px;
        background: var(--aqua);
        border: 1px solid rgba(27, 58, 92, 0.1);
        border-radius: 18px;
      }

      .detail-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .detail-value {
        color: var(--text);
        font-size: 18px;
        font-weight: 600;
        line-height: 1.25;
      }

      .family-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .family-relationship {
        color: var(--muted);
        font-weight: 400;
      }

      .detail-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 20px;
      }

      .detail-member-actions {
        justify-content: flex-start;
      }

      .detail-action-button {
        min-width: 180px;
        font-size: 20px;
      }

      .secondary-button {
        min-height: 56px;
        padding: 0 22px;
        color: var(--navy);
        background: var(--aqua);
        border-radius: 16px;
        font-size: 20px;
        font-weight: 800;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(28px + env(safe-area-inset-bottom));
        z-index: 30;
        min-height: 48px;
        max-width: min(520px, calc(100vw - 32px));
        padding: 12px 20px;
        color: var(--white);
        background: var(--navy);
        border-radius: 999px;
        box-shadow: var(--shadow);
        font-size: 18px;
        font-weight: 750;
        transform: translateX(-50%);
      }

      [hidden] {
        display: none !important;
      }

      @keyframes tealFlash {
        from {
          background: #DDF4FF;
          transform: translateY(-6px);
        }

        to {
          background: rgba(255, 255, 255, 0.96);
          transform: translateY(0);
        }
      }

      @keyframes redPulse {
        0%,
        100% {
          box-shadow: 0 18px 44px rgba(211, 47, 47, 0.18);
        }

        50% {
          box-shadow: 0 18px 54px rgba(211, 47, 47, 0.32);
        }
      }

      @keyframes tealRowFlash {
        from {
          background: rgba(33, 150, 243, 0.24);
        }

        to {
          background: rgba(232, 244, 248, 0.58);
        }
      }

      @keyframes detailIn {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.96);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .detail-panel.closing {
        opacity: 0;
      }

      .detail-panel.closing .detail-card {
        transform: translateY(14px) scale(0.97);
        transition: transform 200ms ease;
      }

      @media (max-height: 720px) {
        body {
          font-size: 18px;
        }

        .app {
          gap: 12px;
          padding-bottom: 14px;
        }

        .moment-card {
          padding: 14px 22px;
        }

        .moment-title {
          font-size: 26px;
        }

        .member-name {
          font-size: inherit;
        }

        .search-input {
          min-height: 62px;
        }

        .panel {
          padding: 24px;
        }
      }

      @media (max-width: 980px) {
        .app {
          overflow-y: auto;
          height: auto;
          min-height: 100dvh;
        }

        body {
          overflow: auto;
        }

        .moment-content {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        .dashboard-panels {
          grid-template-columns: 1fr;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" aria-live="polite">
      <header class="topbar">
        <div class="brand">
          <img
            src="https://assets.cdn.filesafe.space/Bjt6c984XN3YKY5porzI/media/6980bb3566e7ca30baf9488c.png"
            alt="Wedgewood Swim Club logo"
          >
          <div class="brand-title">Welcome to Wedgewood Pool!</div>
        </div>
        <div class="status-cluster">
          <div id="clock" class="clock">--:--</div>
          <div id="connection" class="connection">
            <span class="dot" aria-hidden="true"></span>
            <span id="connectionText">Live</span>
          </div>
        </div>
      </header>

      <main id="momentCard" class="moment-card idle">
        <div id="momentContent" class="moment-content"></div>
        <div id="lastUpdated" class="last-updated" hidden></div>
      </main>

      <section class="search-zone" aria-label="Member search">
        <div class="search-label">
          <span>Look someone up</span>
          <span id="searchMessage" class="search-message"></span>
        </div>
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
              <path d="m16.5 16.5 4 4" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
            </svg>
          </span>
          <input
            id="searchInput"
            class="search-input"
            autocomplete="off"
            autocapitalize="words"
            spellcheck="false"
            type="search"
            placeholder="Type a name to look someone up"
          >
        </div>
        <div id="searchResults" class="results"></div>
      </section>

      <section class="dashboard-panels" aria-label="Pool activity">
        <article class="panel">
          <div class="panel-header">
            <span class="panel-title">
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"></circle>
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              </svg>
              Recent Activity
            </span>
            <span class="panel-subtitle">Last 5</span>
          </div>
          <div id="recentActivity" class="activity-list"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <span class="panel-title">
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 16c2 0 2-1 4-1s2 1 4 1 2-1 4-1 2 1 4 1 2-1 2-1" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                <path d="M3 20c2 0 2-1 4-1s2 1 4 1 2-1 4-1 2 1 4 1 2-1 2-1" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                <path d="M8 10a4 4 0 0 1 8 0" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              </svg>
              Currently in Pool
            </span>
            <span id="activeMessage" class="panel-action-message"></span>
            <button id="resetPoolButton" class="reset-pool-button" type="button" aria-label="Reset Pool" title="Reset Pool">🔄</button>
          </div>
          <div id="activeList" class="active-list"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <span class="panel-title">
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></path>
                <path d="M19 15l.9 2.1L22 18l-2.1.9L19 21l-.9-2.1L16 18l2.1-.9L19 15Z" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8"></path>
              </svg>
              New Members Today
            </span>
            <button id="newMembersToggle" class="new-members-toggle" type="button">Show</button>
          </div>
          <div id="newMembersSummary" class="new-members-count">0</div>
          <div id="newMembersList" class="signup-list" hidden></div>
        </article>
      </section>
    </div>

    <div id="pinOverlay" class="pin-overlay">
      <form id="pinForm" class="pin-card">
        <h1>Staff PIN</h1>
        <p>Open the front desk screen.</p>
        <input
          id="pinInput"
          class="pin-input"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="off"
          aria-label="Staff PIN"
        >
        <div id="pinMessage" class="pin-message"></div>
        <button class="primary-button" type="submit">Open dashboard</button>
      </form>
    </div>

    <div id="detailPanel" class="detail-panel" hidden>
      <div class="detail-card">
        <div id="detailContent"></div>
        <div class="detail-actions">
          <button id="closeDetail" class="secondary-button" type="button">Done</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script>
      const API_URL = '';
      const LOCATION_ID = 'Bjt6c984XN3YKY5porzI';
      const POLL_INTERVAL_MS = 3000;
      const IDLE_TIMEOUT_MS = 1800000;
      const MOMENT_HOLD_MS = 8000;
      const OFFLINE_DIM_MS = 60000;
      const SIGNUP_HELP = "Looks like they aren't a member yet — direct them to wedgewoodpool.com/memberships to sign up";
      const DASHBOARD_TIME_OPTIONS = {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      };

      const idleLines = [
        'Quiet right now',
        'Make sure to say hi!',
        'High five the next person to walk in',
        'Blue skies, pool smiles'
      ];

      const state = {
        dashboardPin: '',
        pollTimer: null,
        clockTimer: null,
        idleLineTimer: null,
        idleCheckTimer: null,
        offlineDimTimer: null,
        wakeLock: null,
        audioContext: null,
        failedPolls: 0,
        currentDelay: POLL_INTERVAL_MS,
        lastSuccessfulAt: null,
        lastInteractionAt: Date.now(),
        firstPoll: true,
        swimmerCount: 0,
        last5: [],
        activeMembers: [],
        signupsToday: [],
        seenEventKeys: new Set(),
        seenEventOrder: [],
        activitySeenKeys: new Set(),
        activityFlashKey: '',
        currentMomentUntil: 0,
        failedMoment: null,
        idleLineIndex: 0,
        searchDebounce: null,
        searchMode: 'normal',
        lastSearchQuery: '',
        totalSearchMatches: 0,
        lastSearchResults: [],
        currentDetailMember: null,
        toastTimer: null,
        signingOutPhones: new Set(),
        newMembersExpanded: false
      };

      const el = {
        clock: document.getElementById('clock'),
        connection: document.getElementById('connection'),
        connectionText: document.getElementById('connectionText'),
        momentCard: document.getElementById('momentCard'),
        momentContent: document.getElementById('momentContent'),
        lastUpdated: document.getElementById('lastUpdated'),
        recentActivity: document.getElementById('recentActivity'),
        activeList: document.getElementById('activeList'),
        activeMessage: document.getElementById('activeMessage'),
        resetPoolButton: document.getElementById('resetPoolButton'),
        newMembersToggle: document.getElementById('newMembersToggle'),
        newMembersSummary: document.getElementById('newMembersSummary'),
        newMembersList: document.getElementById('newMembersList'),
        searchInput: document.getElementById('searchInput'),
        searchResults: document.getElementById('searchResults'),
        searchMessage: document.getElementById('searchMessage'),
        pinOverlay: document.getElementById('pinOverlay'),
        pinForm: document.getElementById('pinForm'),
        pinInput: document.getElementById('pinInput'),
        pinMessage: document.getElementById('pinMessage'),
        detailPanel: document.getElementById('detailPanel'),
        detailContent: document.getElementById('detailContent'),
        closeDetail: document.getElementById('closeDetail'),
        toast: document.getElementById('toast')
      };

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (character) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[character]);
      }

      function formatTime(value = new Date()) {
        const date = value instanceof Date ? value : new Date(value);

        if (Number.isNaN(date.getTime())) {
          return '--:--';
        }

        return date.toLocaleTimeString([], DASHBOARD_TIME_OPTIONS);
      }

      function formatActivityTime(value) {
        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
          return '--:--';
        }

        const minutesAgo = Math.floor((Date.now() - date.getTime()) / 60000);

        if (minutesAgo < 1) {
          return 'just now';
        }

        if (minutesAgo < 60) {
          return `${minutesAgo} ${pluralize(minutesAgo, 'minute')} ago`;
        }

        return formatTime(date);
      }

      function pluralize(count, singular, plural = `${singular}s`) {
        return Number(count) === 1 ? singular : plural;
      }

      function normalizePhone(value) {
        return String(value ?? '').replace(/\D/g, '');
      }

      function renderPhoneLink(phone, phoneRaw) {
        const displayPhone = phone || phoneRaw || 'No phone listed';
        const rawPhone = normalizePhone(phoneRaw || phone);

        if (!rawPhone) {
          return escapeHtml(displayPhone);
        }

        return `<a class="phone-link" href="tel:${escapeHtml(rawPhone)}">${escapeHtml(displayPhone)}</a>`;
      }

      function initialsFor(name) {
        const parts = String(name ?? '')
          .trim()
          .split(/\s+/)
          .filter(Boolean);

        return (parts[0]?.[0] ?? '?') + (parts[1]?.[0] ?? '');
      }

      function eventKey(event) {
        return [
          event?.type ?? '',
          event?.membershipName ?? '',
          event?.timestamp ?? '',
          event?.numAttending ?? '',
          event?.numGuests ?? ''
        ].join('|');
      }

      function rememberEvent(event) {
        const key = eventKey(event);

        if (!key || state.seenEventKeys.has(key)) {
          return;
        }

        state.seenEventKeys.add(key);
        state.seenEventOrder.push(key);

        while (state.seenEventOrder.length > 100) {
          const oldKey = state.seenEventOrder.shift();
          state.seenEventKeys.delete(oldKey);
        }
      }

      function isFailedEvent(event) {
        const type = String(event?.type ?? '').toLowerCase();
        return type.includes('fail') || type === 'error' || type === 'not_found';
      }

      function getEventName(event) {
        return event?.membershipName || event?.attemptedName || event?.name || 'Someone';
      }

      function setMomentMode(mode) {
        el.momentCard.classList.remove('idle', 'check-in', 'failed');
        el.momentCard.classList.add(mode);
      }

      function getSwimmerLine() {
        const count = Number(state.swimmerCount) || 0;
        return `${count} ${pluralize(count, 'swimmer')} in the pool right now`;
      }

      function renderIdle() {
        if (state.failedMoment || Date.now() < state.currentMomentUntil) {
          return;
        }

        const line = idleLines[state.idleLineIndex % idleLines.length];
        setMomentMode('idle');
        el.momentContent.innerHTML = `
          <div class="moment-copy">
            <div class="moment-kicker">🌊 ${escapeHtml(line)}</div>
            <h1 class="moment-title">Welcome to Wedgewood Pool</h1>
            <p class="moment-subtitle">Make sure to say hi.</p>
          </div>
          <div class="swimmer-line">${escapeHtml(getSwimmerLine())}</div>
        `;
      }

      function renderCheckIn(event) {
        const name = getEventName(event);
        const attending = Number(event?.numAttending);
        const familyText = Number.isFinite(attending) && attending > 0
          ? `${attending} ${pluralize(attending, 'person')} on this visit`
          : 'Welcome them';

        state.failedMoment = null;
        state.currentMomentUntil = Date.now() + MOMENT_HOLD_MS;
        setMomentMode('check-in');
        el.momentContent.innerHTML = `
          <div class="moment-identity">
            <div class="avatar" aria-hidden="true">${escapeHtml(initialsFor(name))}</div>
            <div class="moment-copy">
              <div class="moment-kicker">👋 Just signed in!</div>
              <h1 class="moment-title">
                <span class="member-name">${escapeHtml(name)}</span>
              </h1>
              <p class="moment-subtitle">Welcome them</p>
            </div>
          </div>
          <div class="soft-pill">${escapeHtml(familyText)}</div>
        `;

        playChime('check-in');
        window.setTimeout(renderIdle, MOMENT_HOLD_MS);
      }

      function renderFailed(event) {
        const name = getEventName(event);

        state.failedMoment = event;
        state.currentMomentUntil = Number.POSITIVE_INFINITY;
        setMomentMode('failed');
        el.momentContent.innerHTML = `
          <div class="moment-copy">
            <div class="moment-kicker">❗ Couldn't find them — please help</div>
            <h1 class="moment-title">
              <span class="member-name">"${escapeHtml(name)}"</span>
              tried to check in
            </h1>
          </div>
          <div class="failed-actions">
            <button class="primary-button search-failed-button" type="button" data-name="${escapeHtml(name)}">
              Search for them →
            </button>
          </div>
        `;

        playChime('failed');
      }

      function processEvents(events) {
        const newEvents = events.filter((event) => !state.seenEventKeys.has(eventKey(event)));

        events.forEach(rememberEvent);

        if (state.firstPoll) {
          state.firstPoll = false;
          return;
        }

        const momentEvent = newEvents.find((event) => isFailedEvent(event) || event.type === 'check_in');

        if (!momentEvent) {
          return;
        }

        if (isFailedEvent(momentEvent)) {
          renderFailed(momentEvent);
          return;
        }

        if (!state.failedMoment) {
          renderCheckIn(momentEvent);
        }
      }

      function getEventBadges(event) {
        const badges = [];

        if (isFailedEvent(event)) {
          badges.push('<span class="event-badge failed">❌ Failed</span>');
        } else if (event?.type === 'check_in') {
          badges.push('<span class="event-badge checked-in">✅ Checked In</span>');
        } else if (event?.type === 'sign_out') {
          badges.push('<span class="event-badge signed-out">👋 Signed Out</span>');
        }

        if (Number(event?.numGuests) > 0) {
          badges.push('<span class="event-badge guest">🎟️ Guest</span>');
        }

        return badges.join('');
      }

      function renderRecentActivity() {
        const events = state.last5.slice(0, 5);

        if (events.length === 0) {
          el.recentActivity.innerHTML = '<div class="empty-panel">🏊 First check-in of the day coming up — be ready to greet them!</div>';
          return;
        }

        el.recentActivity.innerHTML = events.map((event) => {
          const key = eventKey(event);
          const name = getEventName(event);
          const flashClass = key === state.activityFlashKey ? ' flash' : '';

          return `
            <div class="activity-row${flashClass}">
              <div class="activity-avatar" aria-hidden="true">${escapeHtml(initialsFor(name))}</div>
              <div class="row-name">${escapeHtml(name)}</div>
              <div class="row-time">${escapeHtml(formatActivityTime(event.timestamp || ''))}</div>
              <div class="event-badges">${getEventBadges(event)}</div>
            </div>
          `;
        }).join('');

        if (state.activityFlashKey) {
          window.setTimeout(() => {
            state.activityFlashKey = '';
            renderRecentActivity();
          }, 220);
        }
      }

      function renderActiveList() {
        const members = state.activeMembers.filter((member) => {
          return !state.signingOutPhones.has(normalizePhone(member.phone || member.GSI1SK));
        });

        if (members.length === 0) {
          el.activeList.innerHTML = '<div class="empty-panel">🌊 Pool&apos;s quiet right now — first swimmer of the day will appear here.</div>';
          return;
        }

        el.activeList.innerHTML = members.map((member) => {
          const name = member.membershipName || 'Member';
          const phone = member.phone || member.GSI1SK || '';
          const phoneRaw = member.phone_raw || member.GSI1SK_raw || normalizePhone(phone);
          const signedInAt = member.signedInAt || member.createdAt;
          const phoneKey = normalizePhone(phoneRaw || phone);

          return `
            <div class="active-row" data-phone="${escapeHtml(phoneKey)}">
              <div>
                <div class="row-name">${escapeHtml(name)}</div>
                <div class="row-note">Signed in ${escapeHtml(formatTime(signedInAt || ''))}</div>
              </div>
              <div class="row-time">${renderPhoneLink(phone, phoneRaw)}</div>
              <button class="sign-out-button" type="button" data-phone="${escapeHtml(phoneKey)}">Sign Out</button>
            </div>
          `;
        }).join('');
      }

      function renderNewMembersToday() {
        const count = state.signupsToday.length;
        el.newMembersSummary.textContent = `${count} ${pluralize(count, 'new member')}`;
        el.newMembersToggle.textContent = state.newMembersExpanded ? 'Hide' : 'Show';
        el.newMembersList.hidden = !state.newMembersExpanded;

        if (!state.newMembersExpanded) {
          return;
        }

        if (count === 0) {
          el.newMembersList.innerHTML = '<div class="empty-panel">No new signups yet today. They&apos;ll show here when someone joins.</div>';
          return;
        }

        el.newMembersList.innerHTML = state.signupsToday.map((member) => `
          <div class="signup-row">
            <div>
              <div class="row-name">${escapeHtml(member.name || 'New member')}</div>
              <div class="row-note">${escapeHtml(member.tier || 'Membership')}</div>
            </div>
            <div class="row-time">${escapeHtml(formatTime(member.signed_up_at || ''))}</div>
          </div>
        `).join('');
      }

      function showToast(message) {
        window.clearTimeout(state.toastTimer);
        el.toast.textContent = message;
        el.toast.hidden = false;
        state.toastTimer = window.setTimeout(() => {
          el.toast.hidden = true;
        }, 3200);
      }

      async function manuallySignOut(member, row = null, actionButton = null) {
        const name = member.membershipName || 'Member';
        const confirmed = window.confirm(`Sign out ${name}? They might still be at the pool.`);

        if (!confirmed) {
          return;
        }

        const phone = member.phone_raw || member.GSI1SK_raw || member.phone || member.GSI1SK || '';
        const phoneKey = normalizePhone(phone);
        const button = actionButton || row?.querySelector('.sign-out-button');

        el.activeMessage.classList.remove('error');
        el.activeMessage.textContent = 'Signing out...';

        if (button) {
          button.disabled = true;
        }

        try {
          await postJson('/signout/manual', {
            location_id: LOCATION_ID,
            email: member.email,
            phone,
            signed_out_by: 'front_desk_pin'
          });

          state.signingOutPhones.add(phoneKey);
          window.setTimeout(() => {
            state.signingOutPhones.delete(phoneKey);
          }, 10000);
          row?.classList.add('removing');
          state.activeMembers = state.activeMembers.filter((activeMember) => {
            return normalizePhone(activeMember.phone || activeMember.GSI1SK) !== phoneKey;
          });
          state.swimmerCount = Math.max(0, state.swimmerCount - 1);
          member.is_currently_active = false;
          el.activeMessage.textContent = 'Signed out';
          hideMemberDetail();
          showToast(`👋 Signed out ${name}`);

          window.setTimeout(() => {
            renderActiveList();
            renderSearchResults(state.lastSearchResults);
            renderIdle();
          }, 190);
          pollDashboard();
        } catch (error) {
          if (error.status === 401) {
            showPinOverlay('That PIN did not work. Try again.');
            return;
          }

          el.activeMessage.classList.add('error');
          el.activeMessage.textContent = error.message || 'Could not sign out';

          if (button) {
            button.disabled = false;
          }
        }
      }

      async function manuallyCheckIn(member, button = null) {
        const name = member.membershipName || 'Member';
        const confirmed = window.confirm(`Check in ${name}?`);

        if (!confirmed) {
          return;
        }

        el.searchMessage.textContent = 'Checking in...';

        if (button) {
          button.disabled = true;
        }

        try {
          const result = await postJson('/checkin/manual', {
            location_id: member.location_id || LOCATION_ID,
            email: member.email,
            phone: member.phone_raw || member.phone,
            checked_in_by: 'front_desk_pin'
          });

          el.searchMessage.textContent = result.message || `✓ Checked in ${name}`;

          member.is_currently_active = true;

          renderSearchResults(state.lastSearchResults);
          hideMemberDetail();
          showToast(result.already_in_pool ? result.message : `✓ Checked in ${name}`);
          pollDashboard();
        } catch (error) {
          if (error.status === 401) {
            showPinOverlay('That PIN did not work. Try again.');
            return;
          }

          el.searchMessage.textContent = error.message || 'Could not check in';

          if (button) {
            button.disabled = false;
          }
        }
      }

      async function resetPool() {
        const confirmed = window.confirm('Reset the pool? This will mark all currently checked-in members as signed out. Use this at end of day or after the pool closes for weather.');

        if (!confirmed) {
          return;
        }

        el.activeMessage.classList.remove('error');
        el.activeMessage.textContent = 'Resetting...';
        el.resetPoolButton.disabled = true;

        try {
          await postJson(`/admin/reset-active?location_id=${encodeURIComponent(LOCATION_ID)}`, {});
          state.activeMembers = [];
          state.swimmerCount = 0;
          state.lastSearchResults.forEach((member) => {
            member.is_currently_active = false;
          });
          el.activeMessage.textContent = 'Pool reset — 0 swimmers';
          renderActiveList();
          renderSearchResults(state.lastSearchResults);
          renderIdle();
          pollDashboard();
        } catch (error) {
          if (error.status === 401) {
            showPinOverlay('That PIN did not work. Try again.');
            return;
          }

          window.alert(error.message || 'Could not reset pool');
          el.activeMessage.classList.add('error');
          el.activeMessage.textContent = 'Reset failed';
        } finally {
          el.resetPoolButton.disabled = false;
        }
      }

      function updateClock() {
        el.clock.textContent = formatTime();
      }

      function updateConnection(status) {
        el.connection.classList.remove('reconnecting', 'offline');

        if (status === 'offline') {
          el.connection.classList.add('offline');
          el.connectionText.textContent = 'Offline';
          return;
        }

        if (status === 'reconnecting') {
          el.connection.classList.add('reconnecting');
          el.connectionText.textContent = 'Reconnecting';
          return;
        }

        el.connectionText.textContent = 'Live';
      }

      function showLastUpdated() {
        if (!state.lastSuccessfulAt) {
          return;
        }

        el.momentCard.classList.add('dimmed');
        el.lastUpdated.hidden = false;
        el.lastUpdated.textContent = `Last updated ${formatTime(state.lastSuccessfulAt)}`;
      }

      function hideLastUpdated() {
        el.momentCard.classList.remove('dimmed');
        el.lastUpdated.hidden = true;
      }

      function handlePollSuccess(today, active, signups) {
        window.clearTimeout(state.offlineDimTimer);
        state.failedPolls = 0;
        state.currentDelay = POLL_INTERVAL_MS;
        state.lastSuccessfulAt = new Date();
        hideLastUpdated();
        updateConnection('live');

        const events = Array.isArray(today?.last5) ? today.last5 : [];
        const newestEventKey = events[0] ? eventKey(events[0]) : '';

        if (!state.firstPoll && newestEventKey && !state.activitySeenKeys.has(newestEventKey)) {
          state.activityFlashKey = newestEventKey;
        }

        events.forEach((event) => state.activitySeenKeys.add(eventKey(event)));
        state.last5 = events;
        state.activeMembers = Array.isArray(active?.members) ? active.members : [];
        state.signupsToday = Array.isArray(signups?.members) ? signups.members : [];
        state.swimmerCount = Number(active?.currentlyInPool) || state.activeMembers.length || 0;

        processEvents(events);
        renderRecentActivity();
        renderActiveList();
        renderNewMembersToday();
        renderIdle();
      }

      function handlePollError(error) {
        if (error.status === 401) {
          showPinOverlay('That PIN did not work. Try again.');
          return;
        }

        state.failedPolls += 1;
        state.currentDelay = Math.min(30000, state.failedPolls <= 1 ? POLL_INTERVAL_MS : state.currentDelay * 2);

        updateConnection(state.failedPolls >= 3 ? 'offline' : 'reconnecting');

        if (state.failedPolls === 1) {
          state.offlineDimTimer = window.setTimeout(showLastUpdated, OFFLINE_DIM_MS);
        }
      }

      async function fetchJson(path) {
        const response = await fetch(`${API_URL}${path}`, {
          cache: 'no-store',
          headers: {
            'X-Dashboard-Token': state.dashboardPin
          }
        });

        if (response.status === 401) {
          const error = new Error('Unauthorized');
          error.status = 401;
          throw error;
        }

        if (!response.ok) {
          throw new Error(`Request failed with ${response.status}`);
        }

        return response.json();
      }

      async function postJson(path, body) {
        const response = await fetch(`${API_URL}${path}`, {
          method: 'POST',
          cache: 'no-store',
          headers: {
            'Content-Type': 'application/json',
            'X-Dashboard-Token': state.dashboardPin
          },
          body: JSON.stringify(body)
        });

        if (response.status === 401) {
          const error = new Error('Unauthorized');
          error.status = 401;
          throw error;
        }

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.message || `Request failed with ${response.status}`);
        }

        return payload;
      }

      async function pollDashboard() {
        window.clearTimeout(state.pollTimer);

        try {
          const query = `location_id=${encodeURIComponent(LOCATION_ID)}`;
          const [today, active, signups] = await Promise.all([
            fetchJson(`/dashboard/today?${query}`),
            fetchJson(`/dashboard/active?${query}`),
            fetchJson(`/dashboard/signups-today?${query}`)
          ]);

          handlePollSuccess(today, active, signups);
        } catch (error) {
          handlePollError(error);
        }

        if (state.dashboardPin) {
          state.pollTimer = window.setTimeout(pollDashboard, state.currentDelay);
        }
      }

      function stopPolling() {
        window.clearTimeout(state.pollTimer);
        window.clearTimeout(state.offlineDimTimer);
      }

      function showPinOverlay(message = '') {
        stopPolling();
        state.dashboardPin = '';
        el.pinMessage.textContent = message;
        el.pinInput.value = '';
        el.pinOverlay.hidden = false;
        window.setTimeout(() => el.pinInput.focus(), 60);
      }

      function hidePinOverlay() {
        el.pinOverlay.hidden = true;
      }

      async function unlockAudio() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!AudioContextClass) {
          return;
        }

        if (!state.audioContext) {
          state.audioContext = new AudioContextClass();
        }

        if (state.audioContext.state === 'suspended') {
          await state.audioContext.resume();
        }

        const oscillator = state.audioContext.createOscillator();
        const gain = state.audioContext.createGain();
        oscillator.connect(gain);
        gain.connect(state.audioContext.destination);
        gain.gain.setValueAtTime(0.0001, state.audioContext.currentTime);
        oscillator.start();
        oscillator.stop(state.audioContext.currentTime + 0.02);
      }

      function playChime(kind) {
        if (!state.audioContext || state.audioContext.state !== 'running') {
          return;
        }

        const now = state.audioContext.currentTime;
        const frequencies = kind === 'failed' ? [220, 180] : [660, 880];

        frequencies.forEach((frequency, index) => {
          const oscillator = state.audioContext.createOscillator();
          const gain = state.audioContext.createGain();
          const start = now + (index * 0.09);

          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.08, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);

          oscillator.connect(gain);
          gain.connect(state.audioContext.destination);
          oscillator.start(start);
          oscillator.stop(start + 0.2);
        });
      }

      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator && !state.wakeLock) {
            state.wakeLock = await navigator.wakeLock.request('screen');
            state.wakeLock.addEventListener('release', () => {
              state.wakeLock = null;
            });
          }
        } catch (error) {
          state.wakeLock = null;
        }
      }

      function isMemberActive(member) {
        if (member.is_currently_active === true) {
          return true;
        }

        const memberPhone = normalizePhone(member.phone_raw || member.phone);
        const memberName = String(member.membershipName ?? '').trim().toLowerCase();

        return state.activeMembers.some((activeMember) => {
          const activePhone = normalizePhone(activeMember.phone || activeMember.GSI1SK);
          const activeName = String(activeMember.membershipName ?? '').trim().toLowerCase();
          return (memberPhone && activePhone === memberPhone) || (memberName && activeName === memberName);
        });
      }

      function getLastVisitText(member) {
        if (isMemberActive(member)) {
          return 'In the pool right now';
        }

        const memberName = String(member.membershipName ?? '').trim().toLowerCase();
        const event = state.last5.find((item) => String(item.membershipName ?? '').trim().toLowerCase() === memberName);

        if (event?.timestamp) {
          return `Last seen today ${formatTime(event.timestamp)}`;
        }

        return 'Not in pool today';
      }

      function getFamilyText(member) {
        return member.familyTextRaw || 'Family details not listed';
      }

      function getFamilyCount(member) {
        const familyMembers = Array.isArray(member.familyMembers) ? member.familyMembers : [];
        return familyMembers.length;
      }

      function getFamilyPreview(member) {
        const count = getFamilyCount(member);

        if (count > 0) {
          return `Family · ${count} ${pluralize(count, 'member')}`;
        }

        return 'Family details not listed';
      }

      function getFamilyListHtml(member) {
        const familyMembers = Array.isArray(member.familyMembers) ? member.familyMembers : [];

        if (familyMembers.length === 0) {
          return escapeHtml(getFamilyText(member));
        }

        return `
          <ul class="family-list">
            ${familyMembers.map((person) => `
              <li>
                ${escapeHtml(person.name || 'Family member')}
                ${person.relationship ? `<span class="family-relationship">(${escapeHtml(person.relationship)})</span>` : ''}
              </li>
            `).join('')}
          </ul>
        `;
      }

      function renderSearchResults(matches) {
        state.lastSearchResults = matches;

        if (matches.length === 0) {
          el.searchResults.innerHTML = `
            <div class="${state.searchMode === 'failed' ? 'search-error' : 'empty-state'}">
              ${escapeHtml(state.searchMode === 'failed'
                ? SIGNUP_HELP
                : `No members found for '${state.lastSearchQuery}'. Check spelling or try the first few letters of their last name.`)}
            </div>
          `;
          return;
        }

        el.searchResults.innerHTML = matches.map((member, index) => {
          const active = isMemberActive(member);
          const status = active ? 'In pool' : member.membershipStatus || 'Member';

          return `
            <div class="result-row" role="button" tabindex="0" data-index="${index}">
              <span>
                <span class="result-name">${escapeHtml(member.membershipName || 'Unnamed member')}</span>
                <span class="result-meta">
                  ${escapeHtml(member.membershipType || 'Membership')} · ${renderPhoneLink(member.phone, member.phone_raw)} · ${escapeHtml(getLastVisitText(member))}
                </span>
                <span class="result-family">${escapeHtml(getFamilyPreview(member))}</span>
              </span>
              <span class="result-actions">
                <span class="badge${active ? ' active' : ''}">${escapeHtml(status)}</span>
              </span>
            </div>
          `;
        }).join('');
      }

      async function runSearch(rawQuery) {
        const query = rawQuery.trim();
        state.lastSearchQuery = query;

        if (query.length < 2) {
          state.lastSearchResults = [];
          state.totalSearchMatches = 0;
          el.searchMessage.textContent = '';
          el.searchResults.innerHTML = '';
          return;
        }

        el.searchMessage.textContent = 'Looking...';

        try {
          const params = new URLSearchParams({
            location_id: LOCATION_ID,
            q: query
          });
          const result = await fetchJson(`/members/search?${params.toString()}`);
          const matches = Array.isArray(result?.matches) ? result.matches : [];
          state.totalSearchMatches = Number(result?.totalMatches) || matches.length;

          if (matches.length === 0) {
            el.searchMessage.textContent = '';
          } else if (state.totalSearchMatches > matches.length) {
            el.searchMessage.textContent = `Top ${matches.length} of ${state.totalSearchMatches} matches`;
          } else {
            el.searchMessage.textContent = `${matches.length} ${pluralize(matches.length, 'match', 'matches')}`;
          }

          renderSearchResults(matches);
        } catch (error) {
          if (error.status === 401) {
            showPinOverlay('That PIN did not work. Try again.');
            return;
          }

          el.searchMessage.textContent = '';
          el.searchResults.innerHTML = `
            <div class="search-error">Search is having a hard time. Try again in a moment.</div>
          `;
        }
      }

      function debounceSearch() {
        window.clearTimeout(state.searchDebounce);
        state.searchDebounce = window.setTimeout(() => runSearch(el.searchInput.value), 300);
      }

      function scrollSearchIntoView() {
        el.searchInput.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }

      function searchForFailedName(name) {
        state.searchMode = 'failed';
        el.searchInput.value = name;
        el.searchInput.focus();
        runSearch(name);
      }

      function showMemberDetail(member) {
        const active = isMemberActive(member);
        const action = active ? 'signout' : 'checkin';
        const actionClass = active ? 'manual-sign-out-button' : 'manual-check-in-button';
        const actionLabel = active ? 'Sign Out' : '✓ Check In';

        state.currentDetailMember = member;
        el.detailPanel.classList.remove('closing');
        el.detailContent.innerHTML = `
          <h2>✅ Yes, ${escapeHtml(member.membershipName || 'this person')} is a member</h2>
          <p>${escapeHtml(member.membershipType || 'Membership')}</p>
          <div class="detail-grid">
            <div class="detail-field">
              <span class="detail-label">Family</span>
              <span class="detail-value">${getFamilyListHtml(member)}</span>
            </div>
            <div class="detail-field">
              <span class="detail-label">Phone</span>
              <span class="detail-value">${renderPhoneLink(member.phone, member.phone_raw)}</span>
            </div>
            <div class="detail-field">
              <span class="detail-label">Last Visit</span>
              <span class="detail-value">${escapeHtml(getLastVisitText(member))}</span>
            </div>
          </div>
          <div class="detail-actions detail-member-actions">
            <button class="primary-button ${actionClass} detail-action-button" type="button" data-action="${action}">
              ${escapeHtml(actionLabel)}
            </button>
          </div>
        `;
        el.detailPanel.hidden = false;
        window.setTimeout(() => {
          el.detailContent.querySelector('.detail-action-button')?.focus();
        }, 40);
      }

      function hideMemberDetail() {
        if (el.detailPanel.hidden) {
          return;
        }

        el.detailPanel.classList.add('closing');
        window.setTimeout(() => {
          el.detailPanel.hidden = true;
          el.detailPanel.classList.remove('closing');
          state.currentDetailMember = null;
        }, 200);
      }

      function recordInteraction() {
        state.lastInteractionAt = Date.now();
      }

      function checkIdleTimeout() {
        if (!state.dashboardPin) {
          return;
        }

        if (Date.now() - state.lastInteractionAt >= IDLE_TIMEOUT_MS) {
          showPinOverlay('Enter the PIN to keep going.');
        }
      }

      function bindEvents() {
        ['pointerdown', 'keydown', 'touchstart'].forEach((eventName) => {
          window.addEventListener(eventName, recordInteraction, { passive: true });
        });

        el.pinForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          const pin = el.pinInput.value.trim();

          if (!/^\d{4}$/.test(pin)) {
            el.pinMessage.textContent = 'Use the 4-digit staff PIN.';
            return;
          }

          state.dashboardPin = pin;
          recordInteraction();
          await unlockAudio();
          await requestWakeLock();
          hidePinOverlay();
          pollDashboard();
        });

        el.searchInput.addEventListener('focus', scrollSearchIntoView);

        el.searchInput.addEventListener('input', () => {
          state.searchMode = 'normal';
          scrollSearchIntoView();
          debounceSearch();
        });

        el.searchResults.addEventListener('click', (event) => {
          if (event.target.closest('.phone-link')) {
            return;
          }

          const row = event.target.closest('.result-row');

          if (!row) {
            return;
          }

          const member = state.lastSearchResults[Number(row.dataset.index)];

          if (member) {
            showMemberDetail(member);
          }
        });

        el.searchResults.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') {
            return;
          }

          const row = event.target.closest('.result-row');

          if (!row) {
            return;
          }

          event.preventDefault();
          const member = state.lastSearchResults[Number(row.dataset.index)];

          if (member) {
            showMemberDetail(member);
          }
        });

        el.detailContent.addEventListener('click', (event) => {
          const button = event.target.closest('.detail-action-button');

          if (!button || !state.currentDetailMember) {
            return;
          }

          if (button.dataset.action === 'signout') {
            manuallySignOut(state.currentDetailMember, null, button);
            return;
          }

          manuallyCheckIn(state.currentDetailMember, button);
        });

        el.activeList.addEventListener('click', (event) => {
          const button = event.target.closest('.sign-out-button');

          if (!button) {
            return;
          }

          const row = button.closest('.active-row');
          const phoneKey = button.dataset.phone;
          const member = state.activeMembers.find((activeMember) => {
            return normalizePhone(activeMember.phone || activeMember.GSI1SK) === phoneKey;
          });

          if (row && member) {
            manuallySignOut(member, row);
          }
        });

        el.newMembersToggle.addEventListener('click', () => {
          state.newMembersExpanded = !state.newMembersExpanded;
          renderNewMembersToday();
        });

        el.resetPoolButton.addEventListener('click', resetPool);

        el.momentCard.addEventListener('click', (event) => {
          const button = event.target.closest('.search-failed-button');

          if (button) {
            searchForFailedName(button.dataset.name || getEventName(state.failedMoment));
          }
        });

        el.detailPanel.addEventListener('click', (event) => {
          if (event.target === el.detailPanel) {
            hideMemberDetail();
          }
        });

        el.closeDetail.addEventListener('click', hideMemberDetail);

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            requestWakeLock();
          }
        });
      }

      function init() {
        bindEvents();
        updateClock();
        renderIdle();
        renderRecentActivity();
        renderActiveList();
        renderNewMembersToday();
        state.clockTimer = window.setInterval(updateClock, 10000);
        state.idleLineTimer = window.setInterval(() => {
          state.idleLineIndex += 1;
          renderIdle();
        }, MOMENT_HOLD_MS);
        state.idleCheckTimer = window.setInterval(checkIdleTimeout, 60000);
        showPinOverlay();
      }

      init();
    </script>
  </body>
</html>
